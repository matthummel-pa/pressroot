<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Repofolio — turn your GitHub repos and website projects into a living portfolio">
  <defs>
    <linearGradient id="rfb-bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#201B3A"/>
      <stop offset="1" stop-color="#0E0C1A"/>
    </linearGradient>
    <linearGradient id="rfb-spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6C4CF1"/>
      <stop offset="0.28" stop-color="#FF4D9D"/>
      <stop offset="0.52" stop-color="#FF7A3D"/>
      <stop offset="0.72" stop-color="#FFC53D"/>
      <stop offset="0.88" stop-color="#37E29A"/>
      <stop offset="1" stop-color="#22CFEE"/>
    </linearGradient>
    <linearGradient id="rfb-word" x1="90" y1="230" x2="820" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B9A7FF"/>
      <stop offset="0.5" stop-color="#FF7FB5"/>
      <stop offset="1" stop-color="#FFC06A"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#rfb-bg)"/>

  <!-- glow blobs -->
  <circle cx="1080" cy="140" r="220" fill="#6C4CF1" opacity="0.25"/>
  <circle cx="1180" cy="470" r="200" fill="#FF4D9D" opacity="0.18"/>

  <!-- top spectrum bar -->
  <rect x="0" y="0" width="1280" height="14" fill="url(#rfb-spectrum)"/>

  <!-- Wordmark -->
  <text x="90" y="300" font-family="'Outfit','Poppins','Segoe UI',system-ui,sans-serif" font-size="132" font-weight="800" letter-spacing="-4" fill="url(#rfb-word)">Repofolio</text>
  <rect x="94" y="330" width="470" height="12" rx="6" fill="url(#rfb-spectrum)"/>
  <text x="96" y="404" font-family="'Segoe UI',system-ui,sans-serif" font-size="38" fill="#D9D4F0">Turn your GitHub repos &amp; website projects</text>
  <text x="96" y="452" font-family="'Segoe UI',system-ui,sans-serif" font-size="38" fill="#D9D4F0">into a living portfolio — for WordPress.</text>
  <text x="96" y="536" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="26" letter-spacing="1" fill="#8F89B4">OAuth &#183; Live repo grid &#183; Case-study patterns</text>

  <!-- mini repo card -->
  <g transform="translate(880,360)">
    <rect x="0" y="0" width="320" height="190" rx="24" fill="#FFFFFF"/>
    <rect x="28" y="30" width="264" height="16" rx="8" fill="url(#rfb-spectrum)"/>
    <rect x="28" y="66" width="200" height="13" rx="6.5" fill="#CFC9E6"/>
    <rect x="28" y="92" width="150" height="13" rx="6.5" fill="#E4E0F1"/>
    <circle cx="44" cy="146" r="9" fill="#FFC53D"/>
    <rect x="60" y="139" width="46" height="14" rx="7" fill="#EDEAF7"/>
    <circle cx="132" cy="146" r="9" fill="#37E29A"/>
    <rect x="148" y="139" width="46" height="14" rx="7" fill="#EDEAF7"/>
  </g>
</svg>
