<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pressroot">
  <defs>
    <linearGradient id="prg" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C4CF1"/><stop offset=".55" stop-color="#FF4D9D"/><stop offset="1" stop-color="#FF7A3D"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="24" fill="url(#prg)"/>
  <!-- seedling: stem + leaf + roots (Press + Root) -->
  <g stroke="#FFF9F5" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- stem -->
    <path d="M48 30 V60"/>
    <!-- leaf -->
    <path d="M48 41 C48 31 56 25 66 26 C66 36 59 43 48 41 Z" fill="#FFF9F5" stroke="none"/>
    <!-- ground -->
    <path d="M33 60 H63" opacity="0.9"/>
    <!-- roots -->
    <path d="M48 60 C44 66 41 68 37 71"/>
    <path d="M48 60 C52 66 55 68 59 71"/>
  </g>
</svg>
