<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="Outfit, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6C4CF1"/><stop offset=".28" stop-color="#FF4D9D"/><stop offset=".52" stop-color="#FF7A3D"/>
      <stop offset=".72" stop-color="#FFC53D"/><stop offset=".88" stop-color="#37E29A"/><stop offset="1" stop-color="#22CFEE"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C4CF1"/><stop offset=".55" stop-color="#FF4D9D"/><stop offset="1" stop-color="#FF7A3D"/>
    </linearGradient>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#201B3A"/><stop offset="1" stop-color="#15122A"/>
    </linearGradient>
    <linearGradient id="softlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9B8FF"/><stop offset=".5" stop-color="#FF9DC4"/><stop offset="1" stop-color="#FFC08A"/>
    </linearGradient>
  </defs>

  <!-- page -->
  <rect width="1200" height="860" fill="#FFF9F5"/>
  <rect width="1200" height="8" fill="url(#spectrum)"/>

  <!-- header -->
  <rect x="48" y="44" width="40" height="40" rx="10" fill="url(#brand)"/>
  <text x="62" y="72" font-size="24" font-weight="800" fill="#fff">P</text>
  <text x="100" y="72" font-size="28" font-weight="800" fill="#17151F">Pressroot <tspan fill="#6C4CF1">design language</tspan></text>
  <text x="48" y="112" font-size="13" font-family="'JetBrains Mono', monospace" letter-spacing="2" fill="#5A5676">IRIS SPECTRUM · WARM PAPER · REPOFOLIO IDENTITY</text>

  <!-- palette -->
  <text x="48" y="158" font-size="12" font-family="'JetBrains Mono', monospace" letter-spacing="2" fill="#6C4CF1">PALETTE</text>
  <g font-size="11" font-family="'JetBrains Mono', monospace" fill="#5A5676">
    <rect x="48"  y="172" width="118" height="64" rx="10" fill="#6C4CF1"/><text x="48"  y="256">Iris #6C4CF1</text>
    <rect x="178" y="172" width="118" height="64" rx="10" fill="#FF4D9D"/><text x="178" y="256">Pink #FF4D9D</text>
    <rect x="308" y="172" width="118" height="64" rx="10" fill="#FF7A3D"/><text x="308" y="256">Coral #FF7A3D</text>
    <rect x="438" y="172" width="118" height="64" rx="10" fill="#FFC53D"/><text x="438" y="256">Amber #FFC53D</text>
    <rect x="568" y="172" width="118" height="64" rx="10" fill="#37E29A"/><text x="568" y="256">Lime #37E29A</text>
    <rect x="698" y="172" width="118" height="64" rx="10" fill="#22CFEE"/><text x="698" y="256">Cyan #22CFEE</text>
    <rect x="828" y="172" width="118" height="64" rx="10" fill="#17151F"/><text x="828" y="256">Ink #17151F</text>
    <rect x="958" y="172" width="88" height="64" rx="10" fill="#FFF9F5" stroke="#ECE6FB" stroke-width="1.5"/><text x="958" y="256">Paper</text>
    <rect x="1058" y="172" width="94" height="64" rx="10" fill="#ECE6FB"/><text x="1058" y="256">Hairline</text>
  </g>

  <!-- gradients -->
  <text x="48" y="300" font-size="12" font-family="'JetBrains Mono', monospace" letter-spacing="2" fill="#6C4CF1">GRADIENTS</text>
  <rect x="48" y="314" width="340" height="34" rx="17" fill="url(#brand)"/>
  <text x="60" y="336" font-size="13" font-weight="700" fill="#fff">brand · 135° iris → pink → coral</text>
  <rect x="404" y="314" width="340" height="34" rx="8" fill="url(#spectrum)"/>
  <text x="416" y="336" font-size="13" font-weight="700" fill="#17151F">spectrum · the language bar</text>
  <rect x="760" y="314" width="392" height="34" rx="8" fill="url(#night)"/>
  <text x="772" y="336" font-size="14" font-weight="800" fill="url(#softlight)">soft-light headline gradient on night indigo</text>

  <!-- type -->
  <text x="48" y="404" font-size="12" font-family="'JetBrains Mono', monospace" letter-spacing="2" fill="#6C4CF1">TYPE — OUTFIT · INSTRUMENT SERIF · JETBRAINS MONO</text>
  <circle cx="54" cy="432" r="4" fill="#37E29A"/>
  <text x="66" y="437" font-size="13" font-family="'JetBrains Mono', monospace" letter-spacing="2" fill="#6C4CF1">HOW IT WORKS</text>
  <text x="48" y="496" font-size="52" font-weight="800" letter-spacing="-1.5" fill="#17151F">Your brand in. <tspan fill="#6C4CF1">Your site</tspan> <tspan font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="400">out.</tspan></text>
  <text x="48" y="534" font-size="17" fill="#4B4560">Display 44→78 · 800 · −0.03em — one serif-italic accent word per headline. Body Outfit 17px / 1.65, ~34em measure.</text>
  <text x="48" y="576" font-size="30" font-weight="700" letter-spacing="-0.6" fill="#17151F">H2 · Pick a business. Get its website.</text>
  <text x="48" y="612" font-size="20" font-weight="600" fill="#17151F">H3 · Design generator</text>

  <!-- card anatomy -->
  <text x="48" y="672" font-size="12" font-family="'JetBrains Mono', monospace" letter-spacing="2" fill="#6C4CF1">CARD ANATOMY</text>
  <g>
    <rect x="48" y="688" width="360" height="130" rx="18" fill="#FFFFFF" stroke="#ECE6FB" stroke-width="1.5"/>
    <path d="M66 688 h324 a0 0 0 0 1 0 0 v5 h-324 z" fill="url(#spectrum)"/>
    <text x="72" y="728" font-size="18" font-weight="600" fill="#17151F">✨ Spectrum-topped card</text>
    <text x="72" y="754" font-size="13" fill="#4B4560">White · 1.5px lavender hairline · 18px radius</text>
    <text x="72" y="774" font-size="13" fill="#4B4560">5px spectrum bar · soft cool shadow · −3px lift</text>
  </g>

  <!-- buttons -->
  <text x="452" y="672" font-size="12" font-family="'JetBrains Mono', monospace" letter-spacing="2" fill="#6C4CF1">BUTTONS — PILL 999 · OUTFIT 700</text>
  <rect x="452" y="688" width="196" height="46" rx="23" fill="url(#brand)"/>
  <text x="482" y="717" font-size="16" font-weight="700" fill="#fff">Get started free →</text>
  <rect x="664" y="688" width="140" height="46" rx="23" fill="#fff" stroke="#ECE6FB" stroke-width="1.5"/>
  <text x="692" y="717" font-size="16" font-weight="700" fill="#6C4CF1">Ghost</text>
  <rect x="820" y="688" width="150" height="46" rx="23" fill="url(#night)"/>
  <text x="846" y="717" font-size="16" font-weight="700" fill="#fff">Dark band</text>
  <text x="452" y="768" font-size="13" fill="#4B4560">Radii 6 · 10 · 14 · 18 · 24 · pill — spacing 4·8·12·16·24·32·48·64·96·128</text>
  <text x="452" y="790" font-size="13" fill="#4B4560">Motion 0.15s ease lifts · focus = 2px iris outline, 3px offset · reduced-motion respected</text>

  <!-- badges -->
  <rect x="452" y="806" width="66" height="26" rx="13" fill="url(#brand)"/>
  <text x="466" y="824" font-size="11" font-family="'JetBrains Mono', monospace" fill="#fff">BETA</text>
  <circle cx="540" cy="819" r="5" fill="#37E29A"/>
  <text x="552" y="824" font-size="12" fill="#4B4560">Available — pulsing lime dot</text>
  <rect x="726" y="806" width="112" height="26" rx="13" fill="#EFEAFD"/>
  <text x="742" y="824" font-size="12" font-weight="600" fill="#6C4CF1">iris chip</text>

  <text x="1152" y="844" font-size="11" font-family="'JetBrains Mono', monospace" fill="#5A5676" text-anchor="end">docs/DESIGN-SYSTEM.md · v1.6</text>
</svg>
