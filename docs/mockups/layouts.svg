<svg width="900" height="760" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk','Inter',system-ui,sans-serif">
  <rect width="900" height="760" fill="#FBFAF7"/>
  <text x="40" y="48" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="24" fill="#17191E">Page layout mockups</text>
  <text x="41" y="70" font-family="'Inter',sans-serif" font-size="13" fill="#5C636C">Wireframe drafts for the matthummel.com Sage theme — as built.</text>

  <defs>
    <g id="chrome">
      <rect width="260" height="190" rx="12" fill="#FFFFFF" stroke="#E6E2D9"/>
      <rect width="260" height="26" rx="12" fill="#F4F2EC"/>
      <rect y="14" width="260" height="12" fill="#F4F2EC"/>
      <circle cx="16" cy="13" r="4" fill="#E6E2D9"/><circle cx="30" cy="13" r="4" fill="#E6E2D9"/><circle cx="44" cy="13" r="4" fill="#E6E2D9"/>
    </g>
  </defs>

  <!-- Row 1 -->
  <!-- Home -->
  <g transform="translate(40,100)">
    <use href="#chrome"/>
    <rect x="20" y="40" width="22" height="10" rx="3" fill="#2F6B4E"/>
    <rect x="180" y="40" width="60" height="10" rx="5" fill="#2F6B4E"/>
    <rect x="70" y="74" width="120" height="14" rx="4" fill="#17191E"/>
    <rect x="50" y="94" width="160" height="14" rx="4" fill="#17191E"/>
    <rect x="92" y="118" width="34" height="12" rx="6" fill="#2F6B4E"/>
    <rect x="132" y="118" width="34" height="12" rx="6" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="20" y="150" width="68" height="28" rx="6" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="96" y="150" width="68" height="28" rx="6" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="172" y="150" width="68" height="28" rx="6" fill="#FFF" stroke="#E6E2D9"/>
    <text x="0" y="208" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#17191E">Home / landing</text>
  </g>

  <!-- Blog index -->
  <g transform="translate(320,100)">
    <use href="#chrome"/>
    <rect x="90" y="44" width="80" height="14" rx="4" fill="#17191E"/>
    <rect x="40" y="78" width="60" height="8" rx="3" fill="#5C636C"/>
    <rect x="40" y="92" width="180" height="10" rx="4" fill="#17191E"/>
    <rect x="40" y="108" width="150" height="7" rx="3" fill="#2B2F36"/>
    <line x1="40" y1="124" x2="220" y2="124" stroke="#E6E2D9"/>
    <rect x="40" y="134" width="60" height="8" rx="3" fill="#5C636C"/>
    <rect x="40" y="148" width="180" height="10" rx="4" fill="#17191E"/>
    <rect x="40" y="164" width="150" height="7" rx="3" fill="#2B2F36"/>
    <text x="0" y="208" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#17191E">Blog index</text>
  </g>

  <!-- Single post -->
  <g transform="translate(600,100)">
    <use href="#chrome"/>
    <rect x="100" y="42" width="60" height="7" rx="3" fill="#5C636C"/>
    <rect x="70" y="56" width="120" height="12" rx="4" fill="#17191E"/>
    <rect x="55" y="86" width="150" height="6" rx="3" fill="#2B2F36"/>
    <rect x="55" y="98" width="150" height="6" rx="3" fill="#2B2F36"/>
    <rect x="55" y="110" width="120" height="6" rx="3" fill="#2B2F36"/>
    <rect x="55" y="128" width="90" height="9" rx="3" fill="#17191E"/>
    <rect x="55" y="146" width="150" height="6" rx="3" fill="#2B2F36"/>
    <rect x="55" y="158" width="140" height="6" rx="3" fill="#2B2F36"/>
    <text x="0" y="208" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#17191E">Single post (reading)</text>
  </g>

  <!-- Row 2 -->
  <!-- Projects -->
  <g transform="translate(40,360)">
    <use href="#chrome"/>
    <rect x="95" y="42" width="70" height="13" rx="4" fill="#17191E"/>
    <rect x="20" y="72" width="68" height="56" rx="8" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="96" y="72" width="68" height="56" rx="8" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="172" y="72" width="68" height="56" rx="8" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="20" y="136" width="68" height="44" rx="8" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="96" y="136" width="68" height="44" rx="8" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="172" y="136" width="68" height="44" rx="8" fill="#FFF" stroke="#E6E2D9"/>
    <text x="0" y="208" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#17191E">Projects archive</text>
  </g>

  <!-- Contact -->
  <g transform="translate(320,360)">
    <use href="#chrome"/>
    <rect x="90" y="42" width="80" height="13" rx="4" fill="#17191E"/>
    <rect x="60" y="70" width="140" height="6" rx="3" fill="#2B2F36"/>
    <rect x="50" y="92" width="40" height="7" rx="3" fill="#17191E"/>
    <rect x="50" y="102" width="160" height="18" rx="5" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="50" y="126" width="40" height="7" rx="3" fill="#17191E"/>
    <rect x="50" y="136" width="160" height="18" rx="5" fill="#FFF" stroke="#E6E2D9"/>
    <rect x="50" y="162" width="70" height="20" rx="6" fill="#2F6B4E"/>
    <text x="0" y="208" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#17191E">Contact + form</text>
  </g>

  <!-- Header / footer system -->
  <g transform="translate(600,360)">
    <use href="#chrome"/>
    <rect x="0" y="26" width="260" height="14" fill="#17191E"/>
    <rect x="180" y="30" width="60" height="6" rx="3" fill="#FFF" opacity=".7"/>
    <rect x="14" y="50" width="18" height="9" rx="3" fill="#2F6B4E"/>
    <rect x="40" y="50" width="70" height="9" rx="3" fill="#17191E"/>
    <rect x="210" y="48" width="30" height="14" rx="4" fill="#2F6B4E"/>
    <rect x="178" y="50" width="22" height="10" rx="3" fill="#5C636C"/>
    <rect x="150" y="80" width="110" height="100" rx="0" fill="#17191E"/>
    <rect x="166" y="96" width="60" height="8" rx="3" fill="#FFF" opacity=".85"/>
    <rect x="166" y="114" width="50" height="8" rx="3" fill="#FFF" opacity=".7"/>
    <rect x="166" y="132" width="70" height="8" rx="3" fill="#FFF" opacity=".7"/>
    <circle cx="172" cy="160" r="6" fill="#2F6B4E"/><circle cx="190" cy="160" r="6" fill="#2F6B4E"/><circle cx="208" cy="160" r="6" fill="#2F6B4E"/>
    <text x="0" y="208" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#17191E">Top bar + popout menu</text>
  </g>
</svg>
